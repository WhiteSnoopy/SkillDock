name: promote-stable-approval

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce-owner-and-supervisor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        id: collect-reviews
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr || !pr.title.startsWith('promote-stable:')) {
              core.setOutput('skip', 'true');
              core.setOutput('reviews', '[]');
              return;
            }
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100
              }
            );
            core.setOutput('skip', 'false');
            core.setOutput('reviews', JSON.stringify(reviews));
      - name: Enforce owner and supervisor approval
        if: steps.collect-reviews.outputs.skip == 'false'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_REVIEWS_JSON: ${{ steps.collect-reviews.outputs.reviews }}
        run: node scripts/enforce-promote-stable-approval.mjs
