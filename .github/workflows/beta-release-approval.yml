name: beta-release-supervisor-approval

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce-supervisor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        name: Validate supervisor approval for beta-release PR
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            if (!pr || !pr.title.startsWith('beta-release:')) {
              core.info('Not a beta-release PR. Skip.');
              return;
            }

            const raw = fs.readFileSync('.github/supervisors.json', 'utf8');
            const cfg = JSON.parse(raw);
            const supervisors = new Set(cfg.supervisors || []);
            if (supervisors.size === 0) {
              core.setFailed('No supervisors configured in .github/supervisors.json');
              return;
            }

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100
              }
            );

            const approved = reviews
              .filter((r) => r.state === 'APPROVED')
              .some((r) => r.user && supervisors.has(r.user.login));

            if (!approved) {
              core.setFailed('beta-release PR requires supervisor approval before merge');
              return;
            }

            core.info('Supervisor approval check passed.');
