name: promotion-merge-queue

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

concurrency:
  group: promotion-${{ github.event.pull_request.base.ref || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  promotion-queue-check:
    if: startsWith(github.event.pull_request.title, 'beta-release:') || startsWith(github.event.pull_request.title, 'promote-stable:') || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Queue gate
        run: echo "Promotion PR participates in merge queue serialization"
