name: beta-release-post-merge

on:
  pull_request:
    types: [closed]

jobs:
  post-merge-update:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'beta-release:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Update beta pointer and audit artifacts
        run: node scripts/post-merge-beta-release-update.mjs
      - name: Commit post-merge registry updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry/skills/*/channels.json
          git diff --cached --quiet || git commit -m "chore: update beta pointer after merged beta-release PR"
          git push
